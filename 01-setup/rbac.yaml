# Grant verbs on both the legacy cluster-scoped (.upbound.io) and the
# namespaced (.m.upbound.io) Azure dbforpostgresql API groups to every
# ServiceAccount in crossplane-system. That covers both the provider's
# own SA (whose name carries a per-revision hash suffix that changes on
# upgrade) and the core `crossplane` SA that composes namespaced managed
# resources into the consumer's namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane:provider-azure-dbforpostgresql
rules:
  - apiGroups:
      - dbforpostgresql.azure.upbound.io
      - dbforpostgresql.azure.m.upbound.io
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane:provider-azure-dbforpostgresql
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crossplane:provider-azure-dbforpostgresql
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: system:serviceaccounts:crossplane-system
